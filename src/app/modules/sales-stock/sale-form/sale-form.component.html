<h2 mat-dialog-title>{{  data  ?  'Modifier  Vente'  :  'Ajouter  Vente'  }}</h2>
<mat-dialog-content>
    <form  [formGroup]="form">
        <mat-form-field  appearance="fill">
           <mat-label>Produit</mat-label>
            <input  matInput  formControlName="productName">
        </mat-form-field>

       <mat-form-field  appearance="fill">
            <mat-label>Quantité</mat-label>
            <input  matInput  type="number"  formControlName="quantity">
       </mat-form-field>

        <mat-form-field  appearance="fill">
            <mat-label>Prix  Unitaire</mat-label>
            <input matInput  type="number"  formControlName="unitPrice">
        </mat-form-field>

        <mat-form-field  appearance="fill">
            <mat-label>Date  de Vente</mat-label>
            <input  matInput  type="date"  formControlName="saleDate">
        </mat-form-field>

        <mat-form-field  appearance="fill">
           <mat-label>Patient  ID  (optionnel)</mat-label>
            <input  matInput  formControlName="patientId">
        </mat-form-field>

        <mat-form-field  appearance="fill">
            <mat-label>Vendu  par  (User  ID)</mat-label>
           <input  matInput  formControlName="soldBy">
        </mat-form-field>
    </form>
</mat-dialog-content>

<mat-dialog-actions  align="end">
    <button  mat-button  (click)="cancel()">Annuler</button>
    <button mat-raised-button  color="primary"  (click)="save()">Enregistrer</button>
</mat-dialog-actions>
