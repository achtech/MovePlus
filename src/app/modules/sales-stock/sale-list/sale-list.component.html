<div class="table-container">
   <div class="table-controls-panel">
       <div class="button-group">
           <p-button label="Ajouter Vente" icon="pi pi-plus" (click)="addSale()" />
           <p-button label="Voir Stock" icon="pi pi-eye" routerLink="/sales-stock/stock" [outlined]="true" />
       </div>
       <p-iconfield iconPosition="left" class="search-input">
           <p-inputicon>
               <i class="pi pi-search"></i>
           </p-inputicon>
           <input pInputText type="text" (input)="dt1.filterGlobal($event.target.value, 'contains')" placeholder="Search keyword" />
       </p-iconfield>
   </div>

   <div class="table-list-panel">
       <p-table #dt1 [value]="sales" dataKey="id" [rows]="10" [rowsPerPageOptions]="[10, 25, 50]" [loading]="loading" [paginator]="true" [globalFilterFields]="['productName', 'quantity', 'unitPrice', 'total', 'saleDate']" showGridlines>
           <ng-template #caption>
               <div class="flex">
                   <p-button label="Clear" [outlined]="true" icon="pi pi-filter-slash" (click)="clear(dt1)" />
               </div>
           </ng-template>
           <ng-template #header>
               <tr>
                   <th style="min-width:15rem">
                       <div class="flex items-center justify-between">
                           Produit
                           <p-columnFilter type="text" field="productName" display="menu" />
                       </div>
                   </th>
                   <th style="min-width:10rem">
                       <div class="flex items-center justify-between">
                           Quantité
                           <p-columnFilter type="numeric" field="quantity" display="menu" />
                       </div>
                   </th>
                   <th style="min-width:10rem">
                       <div class="flex items-center justify-between">
                           Prix Unitaire
                           <p-columnFilter type="numeric" field="unitPrice" display="menu" currency="EUR" />
                       </div>
                   </th>
                   <th style="min-width:10rem">
                       <div class="flex items-center justify-between">
                           Total
                           <p-columnFilter type="numeric" field="total" display="menu" currency="EUR" />
                       </div>
                   </th>
                   <th style="min-width:10rem">
                       <div class="flex items-center justify-between">
                           Date
                           <p-columnFilter type="date" field="saleDate" display="menu" />
                       </div>
                   </th>
                   <th style="min-width:10rem">
                       Actions
                   </th>
               </tr>
           </ng-template>
           <ng-template #body let-s>
               <tr>
                   <td>
                       {{ s.productName }}
                   </td>
                   <td>
                       {{ s.quantity }}
                   </td>
                   <td>
                       {{ s.unitPrice | currency:'EUR' }}
                   </td>
                   <td>
                       {{ s.total | currency:'EUR' }}
                   </td>
                   <td>
                       {{ s.saleDate | date:'shortDate' }}
                   </td>
                   <td>
                       <p-button icon="pi pi-pencil" [outlined]="true" (click)="editSale(s)" />
                       <p-button icon="pi pi-trash" [outlined]="true" severity="danger" (click)="deleteSale(s.id!)" />
                   </td>
               </tr>
           </ng-template>
           <ng-template #emptymessage>
               <tr>
                   <td colspan="6">No sales found.</td>
               </tr>
           </ng-template>
       </p-table>
   </div>
</div>
