<div  class="expense-list">
   <button  mat-raised-button color="primary"  (click)="addExpense()">Ajouter  Charge</button>

   <table  mat-table [dataSource]="expenses"  class="mat-elevation-z8">
       <ng-container  matColumnDef="description">
          <th  mat-header-cell *matHeaderCellDef>Description</th>
           <td mat-cell  *matCellDef="let  e">{{  e.description }}</td>
       </ng-container>

       <ng-container matColumnDef="amount">
           <th mat-header-cell  *matHeaderCellDef>Montant</th>
          <td  mat-cell  *matCellDef="let  e">{{ e.amount  |  currency:'EUR'  }}</td>
      </ng-container>

       <ng-container  matColumnDef="category">
          <th  mat-header-cell *matHeaderCellDef>Catégorie</th>
           <td mat-cell  *matCellDef="let  e">{{  e.category }}</td>
       </ng-container>

       <ng-container matColumnDef="date">
           <th mat-header-cell  *matHeaderCellDef>Date</th>
          <td  mat-cell  *matCellDef="let  e">{{ e.date  |  date:'shortDate'  }}</td>
      </ng-container>

       <ng-container  matColumnDef="actions">
          <th  mat-header-cell *matHeaderCellDef>Actions</th>
           <td mat-cell  *matCellDef="let  e">
              <button mat-icon-button  color="accent"  (click)="editExpense(e)">
                 <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button  color="warn"  (click)="deleteExpense(e.id!)">
                 <mat-icon>delete</mat-icon>
              </button>
          </td>
       </ng-container>

      <tr  mat-header-row  *matHeaderRowDef="displayedColumns"></tr>
       <tr mat-row  *matRowDef="let  row;  columns: displayedColumns;"></tr>
    </table>

</div>
