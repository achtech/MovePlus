<div class="table-page">
  <app-card cardTitle="Charges" [options]="false">
    <div class="table-toolbar">
      <p-button label="Ajouter Charge" icon="pi pi-plus" (click)="addExpense()" />
      <p-iconfield iconPosition="left" class="search-input">
        <p-inputicon>
          <i class="pi pi-search"></i>
        </p-inputicon>
        <input pInputText type="text" (input)="dt1.filterGlobal($event.target.value, 'contains')" placeholder="Rechercher..." />
      </p-iconfield>
    </div>

    <p-table #dt1 [value]="expenses" dataKey="id" [rows]="10" [rowsPerPageOptions]="[10, 25, 50]" [loading]="loading" [paginator]="true" [globalFilterFields]="['description', 'amount', 'category', 'createdAt', 'paidBy']" showGridlines>
      <ng-template pTemplate="header">
        <tr>
          <th style="min-width:15rem">
            <div class="flex items-center justify-between">
              Description
              <p-columnFilter type="text" field="description" display="menu" />
            </div>
          </th>
          <th style="min-width:10rem">
            <div class="flex items-center justify-between">
              Montant
              <p-columnFilter type="numeric" field="amount" display="menu" currency="EUR" />
            </div>
          </th>
          <th style="min-width:10rem">
            <div class="flex items-center justify-between">
              Catégorie
              <p-columnFilter type="text" field="category" display="menu" />
            </div>
          </th>
          <th style="min-width:10rem">
            <div class="flex items-center justify-between">
              Date & Heure
              <p-columnFilter type="date" field="createdAt" display="menu" />
            </div>
          </th>
          <th style="min-width:10rem">
            <div class="flex items-center justify-between">
              Payé par
              <p-columnFilter type="numeric" field="paidBy" display="menu" />
            </div>
          </th>
          <th style="min-width:10rem">Actions</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-e>
        <tr>
          <td>{{ e.description }}</td>
          <td>{{ e.amount | currency:'EUR' }}</td>
          <td>{{ e.category }}</td>
          <td>{{ e.createdAt | date:'short' }}</td>
          <td>{{ e.paidByName || e.paidBy }}</td>
          <td>
            <p-button icon="pi pi-pencil" [outlined]="true" (click)="editExpense(e)" />
            <p-button icon="pi pi-trash" [outlined]="true" severity="danger" (click)="deleteExpense(e.id!)" />
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="6">Aucune charge trouvée.</td>
        </tr>
      </ng-template>
    </p-table>
  </app-card>
</div>
