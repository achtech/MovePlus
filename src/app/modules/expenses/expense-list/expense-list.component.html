<div class="table-container">
   <div class="table-controls-panel">
       <p-button label="Ajouter Charge" icon="pi pi-plus" (click)="addExpense()" class="clear-button" />
       <p-iconfield iconPosition="left" class="search-input">
           <p-inputicon>
               <i class="pi pi-search"></i>
           </p-inputicon>
           <input pInputText type="text" (input)="dt1.filterGlobal($event.target.value, 'contains')" placeholder="Search keyword" />
       </p-iconfield>
   </div>

   <div class="table-list-panel">
       <p-table #dt1 [value]="expenses" dataKey="id" [rows]="10" [rowsPerPageOptions]="[10, 25, 50]" [loading]="loading" [paginator]="true" [globalFilterFields]="['description', 'amount', 'category', 'date']" showGridlines>
           <ng-template #caption>
               <div class="flex">
                   <p-button label="Clear" [outlined]="true" icon="pi pi-filter-slash" (click)="clear(dt1)" />
               </div>
           </ng-template>
           <ng-template #header>
               <tr>
                   <th style="min-width:15rem">
                       <div class="flex items-center justify-between">
                           Description
                           <p-columnFilter type="text" field="description" display="menu" />
                       </div>
                   </th>
                   <th style="min-width:10rem">
                       <div class="flex items-center justify-between">
                           Montant
                           <p-columnFilter type="numeric" field="amount" display="menu" currency="EUR" />
                       </div>
                   </th>
                   <th style="min-width:10rem">
                       <div class="flex items-center justify-between">
                           Catégorie
                           <p-columnFilter type="text" field="category" display="menu" />
                       </div>
                   </th>
                   <th style="min-width:10rem">
                       <div class="flex items-center justify-between">
                           Date
                           <p-columnFilter type="date" field="date" display="menu" />
                       </div>
                   </th>
                   <th style="min-width:10rem">
                       Actions
                   </th>
               </tr>
           </ng-template>
           <ng-template #body let-e>
               <tr>
                   <td>
                       {{ e.description }}
                   </td>
                   <td>
                       {{ e.amount | currency:'EUR' }}
                   </td>
                   <td>
                       {{ e.category }}
                   </td>
                   <td>
                       {{ e.date | date:'shortDate' }}
                   </td>
                   <td>
                       <p-button icon="pi pi-pencil" [outlined]="true" (click)="editExpense(e)" />
                       <p-button icon="pi pi-trash" [outlined]="true" severity="danger" (click)="deleteExpense(e.id!)" />
                   </td>
               </tr>
           </ng-template>
           <ng-template #emptymessage>
               <tr>
                   <td colspan="5">No expenses found.</td>
               </tr>
           </ng-template>
       </p-table>
   </div>
</div>
