<h2 mat-dialog-title>{{ data ? 'Modifier Charge' : 'Ajouter Charge' }}</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="datta-form-grid">
    <div class="row">
      <div class="form-group col-md-6">
        <label for="description">Description</label>
        <input id="description" type="text" class="form-control" formControlName="description">
      </div>
      <div class="form-group col-md-6">
        <label for="amount">Montant</label>
        <input id="amount" type="number" class="form-control" formControlName="amount">
      </div>
    </div>
    <div class="row">
      <div class="form-group col-md-6">
        <label for="category">Catégorie</label>
        <select id="category" class="form-control" formControlName="category">
          <option value="">Sélectionner...</option>
          <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
        </select>
      </div>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="datta-dialog-actions">
  <button type="button" class="btn btn-secondary" (click)="cancel()">Annuler</button>
  <button type="button" class="btn btn-primary" (click)="save()">Enregistrer</button>
</mat-dialog-actions>
