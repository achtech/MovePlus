<h2 mat-dialog-title>{{ data ? 'Modifier membre' : 'Ajouter membre' }}</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="datta-form-grid">
    <div class="row">
      <div class="form-group col-md-6">
        <label for="fullName">Nom complet</label>
        <input id="fullName" type="text" class="form-control" formControlName="fullName" />
      </div>
      <div class="form-group col-md-6">
        <label for="phoneNumber">Téléphone</label>
        <input id="phoneNumber" type="text" class="form-control" formControlName="phoneNumber" />
      </div>
    </div>
    <div class="row">
      <div class="form-group col-md-6">
        <label for="startDate">Date de début</label>
        <input id="startDate" type="date" class="form-control" formControlName="startDate" />
      </div>
      <div class="form-group col-md-6">
        <label for="endDate">Date de fin</label>
        <input id="endDate" type="date" class="form-control" formControlName="endDate" />
      </div>
    </div>
    <div class="row">
      <div class="form-group col-md-6">
        <label for="specialty">Spécialité</label>
        <input id="specialty" type="text" class="form-control" formControlName="specialty" />
      </div>
      <div class="form-group col-md-6">
        <label for="role">Rôle</label>
        <select id="role" class="form-control" formControlName="role">
          <option value="">Sélectionner...</option>
          <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div class="form-group col-md-6">
        <label for="status">Statut</label>
        <select id="status" class="form-control" formControlName="status">
          <option value="ACTIVE">Actif</option>
          <option value="INACTIVE">Inactif</option>
        </select>
      </div>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="datta-dialog-actions">
  <button type="button" class="btn btn-secondary" (click)="cancel()">Annuler</button>
  <button type="button" class="btn btn-primary" (click)="save()">Enregistrer</button>
</mat-dialog-actions>
