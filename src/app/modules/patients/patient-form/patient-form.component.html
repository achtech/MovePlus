<h2 mat-dialog-title>{{ data ? 'Modifier Patient' : 'Ajouter Patient' }}</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="datta-form-grid">
    <div class="row">
      <div class="form-group col-md-6">
        <label for="firstName">Prénom</label>
        <input id="firstName" type="text" class="form-control" formControlName="firstName">
      </div>
      <div class="form-group col-md-6">
        <label for="lastName">Nom</label>
        <input id="lastName" type="text" class="form-control" formControlName="lastName">
      </div>
    </div>
    <div class="row">
      <div class="form-group col-md-6">
        <label for="birthDate">Date de naissance</label>
        <input id="birthDate" type="date" class="form-control" formControlName="birthDate">
      </div>
      <div class="form-group col-md-6">
        <label for="phone">Téléphone</label>
        <input id="phone" type="text" class="form-control" formControlName="phone">
      </div>
    </div>
    <div class="row">
      <div class="form-group col-md-6">
        <label for="email">Email</label>
        <input id="email" type="email" class="form-control" formControlName="email">
      </div>
      <div class="form-group col-md-6">
        <label for="address">Adresse</label>
        <input id="address" type="text" class="form-control" formControlName="address">
      </div>
    </div>
    <div class="form-group">
      <label for="medicalNotes">Notes médicales</label>
      <textarea id="medicalNotes" class="form-control" rows="3" formControlName="medicalNotes"></textarea>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="datta-dialog-actions">
  <button type="button" class="btn btn-secondary" (click)="cancel()">Annuler</button>
  <button type="button" class="btn btn-primary" (click)="save()">Enregistrer</button>
</mat-dialog-actions>
