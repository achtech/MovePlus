<div class="table-page">
  <app-card cardTitle="Séances" [options]="false">
    <div class="table-toolbar">
      <div class="button-group">
        <p-button label="Planifier Séance" icon="pi pi-plus" (click)="addSeance()" />
        <p-button
          [label]="showAgenda ? 'Voir Liste' : 'Voir Agenda'"
          [icon]="showAgenda ? 'pi pi-list' : 'pi pi-calendar'"
          (click)="toggleAgenda()"
          [outlined]="true"
        />
      </div>
      <p-iconfield iconPosition="left" class="search-input" *ngIf="!showAgenda">
        <p-inputicon>
          <i class="pi pi-search"></i>
        </p-inputicon>
        <input pInputText type="text" (input)="dt1?.filterGlobal($event.target.value, 'contains')" placeholder="Rechercher..." />
      </p-iconfield>
    </div>

    <div *ngIf="!showAgenda">
      <p-table #dt1 [value]="seances" dataKey="id" [rows]="10" [rowsPerPageOptions]="[10, 25, 50]" [loading]="loading" [paginator]="true" [globalFilterFields]="['patientId', 'therapistId', 'dateTime', 'duration', 'type', 'status', 'patientName', 'therapistName']" showGridlines>
        <ng-template #caption>
          <div class="flex">
            <p-button label="Clear" [outlined]="true" icon="pi pi-filter-slash" (click)="clear(dt1)" />
          </div>
        </ng-template>
        <ng-template #header>
          <tr>
            <th style="min-width:10rem">
              <div class="flex items-center justify-between">
                Patient
                <p-columnFilter type="text" field="patientId" display="menu" />
              </div>
            </th>
            <th style="min-width:10rem">
              <div class="flex items-center justify-between">
                Thérapeute
                <p-columnFilter type="text" field="therapistId" display="menu" />
              </div>
            </th>
            <th style="min-width:15rem">
              <div class="flex items-center justify-between">
                Date
                <p-columnFilter type="date" field="dateTime" display="menu" />
              </div>
            </th>
            <th style="min-width:10rem">
              <div class="flex items-center justify-between">
                Durée (min)
                <p-columnFilter type="numeric" field="duration" display="menu" />
              </div>
            </th>
            <th style="min-width:10rem">
              <div class="flex items-center justify-between">
                Type
                <p-columnFilter type="text" field="type" display="menu" />
              </div>
            </th>
            <th style="min-width:10rem">
              <div class="flex items-center justify-between">
                Statut
                <p-columnFilter type="text" field="status" display="menu" />
              </div>
            </th>
            <th style="min-width:10rem">Actions</th>
          </tr>
        </ng-template>
        <ng-template #body let-s>
          <tr>
            <td>{{ getPatientName(s.patientId) }}</td>
            <td>{{ getTherapistName(s.therapistId) }}</td>
            <td>{{ s.dateTime | date:'short' }}</td>
            <td>{{ s.duration }}</td>
            <td>{{ s.type }}</td>
            <td>
              <span [ngClass]="{'status-completed': s.status === 'COMPLETED', 'status-scheduled': s.status === 'SCHEDULED', 'status-cancelled': s.status === 'CANCELLED'}">
                {{ s.status }}
              </span>
            </td>
            <td>
              <p-button icon="pi pi-pencil" [outlined]="true" severity="info" (click)="editSeance(s)" pTooltip="Modifier Séance" />
              <p-button icon="pi pi-trash" [outlined]="true" severity="danger" (click)="deleteSeance(s.id!)" pTooltip="Supprimer Séance" />
            </td>
          </tr>
        </ng-template>
        <ng-template #emptymessage>
          <tr>
            <td colspan="7">Aucune séance trouvée.</td>
          </tr>
        </ng-template>
      </p-table>
    </div>

    <div class="agenda-panel" *ngIf="showAgenda">
      <full-calendar [options]="calendarOptions"></full-calendar>
    </div>
  </app-card>
</div>
