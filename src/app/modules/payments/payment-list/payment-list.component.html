<div class="table-container">
   <div class="table-controls-panel">
       <p-button label="Ajouter Paiement" icon="pi pi-plus" (click)="addPayment()" class="clear-button" />
       <p-iconfield iconPosition="left" class="search-input">
           <p-inputicon>
               <i class="pi pi-search"></i>
           </p-inputicon>
           <input pInputText type="text" (input)="dt1.filterGlobal($event.target.value, 'contains')" placeholder="Search keyword" />
       </p-iconfield>
   </div>

   <h3>Total:  {{ totalAmount  |  currency:'EUR'  }}</h3>

   <div class="table-list-panel">
       <p-table #dt1 [value]="payments" dataKey="id" [rows]="10" [rowsPerPageOptions]="[10, 25, 50]" [loading]="loading" [paginator]="true" [globalFilterFields]="['patientId', 'amount', 'date', 'method', 'status']" showGridlines>
           <ng-template #caption>
               <div class="flex">
                   <p-button label="Clear" [outlined]="true" icon="pi pi-filter-slash" (click)="clear(dt1)" />
               </div>
           </ng-template>
           <ng-template #header>
               <tr>
                   <th style="min-width:10rem">
                       <div class="flex items-center justify-between">
                           Patient
                           <p-columnFilter type="text" field="patientId" display="menu" />
                       </div>
                   </th>
                   <th style="min-width:10rem">
                       <div class="flex items-center justify-between">
                           Montant
                           <p-columnFilter type="numeric" field="amount" display="menu" currency="EUR" />
                       </div>
                   </th>
                   <th style="min-width:10rem">
                       <div class="flex items-center justify-between">
                           Date
                           <p-columnFilter type="date" field="date" display="menu" />
                       </div>
                   </th>
                   <th style="min-width:10rem">
                       <div class="flex items-center justify-between">
                           Méthode
                           <p-columnFilter type="text" field="method" display="menu" />
                       </div>
                   </th>
                   <th style="min-width:10rem">
                       <div class="flex items-center justify-between">
                           Statut
                           <p-columnFilter type="text" field="status" display="menu" />
                       </div>
                   </th>
                   <th style="min-width:10rem">
                       Actions
                   </th>
               </tr>
           </ng-template>
           <ng-template #body let-p>
               <tr>
                   <td>
                       {{ p.patientId }}
                   </td>
                   <td>
                       {{ p.amount | currency:'EUR' }}
                   </td>
                   <td>
                       {{ p.date | date:'shortDate' }}
                   </td>
                   <td>
                       {{ p.method }}
                   </td>
                   <td>
                       {{ p.status }}
                   </td>
                   <td>
                       <p-button icon="pi pi-pencil" [outlined]="true" (click)="editPayment(p)" />
                       <p-button icon="pi pi-trash" [outlined]="true" severity="danger" (click)="deletePayment(p.id!)" />
                   </td>
               </tr>
           </ng-template>
           <ng-template #emptymessage>
               <tr>
                   <td colspan="6">No payments found.</td>
               </tr>
           </ng-template>
       </p-table>
   </div>
</div>
