<div  class="payment-list">
   <button  mat-raised-button color="primary"  (click)="addPayment()">Ajouter  Paiement</button>

   <h3>Total:  {{ totalAmount  |  currency:'EUR'  }}</h3>

    <table mat-table  [dataSource]="payments"  class="mat-elevation-z8">
       <ng-container matColumnDef="patientId">
           <th mat-header-cell  *matHeaderCellDef>Patient</th>
          <td  mat-cell  *matCellDef="let  p">{{ p.patientId  }}</td>
       </ng-container>

      <ng-container  matColumnDef="amount">
          <th  mat-header-cell  *matHeaderCellDef>Montant</th>
          <td  mat-cell  *matCellDef="let p">{{  p.amount  |  currency:'EUR' }}</td>
       </ng-container>

       <ng-container matColumnDef="date">
           <th mat-header-cell  *matHeaderCellDef>Date</th>
          <td  mat-cell  *matCellDef="let  p">{{ p.date  |  date:'shortDate'  }}</td>
      </ng-container>

       <ng-container  matColumnDef="method">
          <th  mat-header-cell *matHeaderCellDef>Méthode</th>
           <td mat-cell  *matCellDef="let  p">{{  p.method }}</td>
       </ng-container>

       <ng-container matColumnDef="status">
           <th mat-header-cell  *matHeaderCellDef>Statut</th>
          <td  mat-cell  *matCellDef="let  p">{{ p.status  }}</td>
       </ng-container>

      <ng-container  matColumnDef="actions">
          <th  mat-header-cell  *matHeaderCellDef>Actions</th>
          <td  mat-cell  *matCellDef="let p">
              <button  mat-icon-button  color="accent" (click)="editPayment(p)">
                  <mat-icon>edit</mat-icon>
             </button>
              <button  mat-icon-button  color="warn" (click)="deletePayment(p.id!)">
                  <mat-icon>delete</mat-icon>
             </button>
           </td>
      </ng-container>

       <tr  mat-header-row *matHeaderRowDef="displayedColumns"></tr>
       <tr  mat-row  *matRowDef="let row;  columns:  displayedColumns;"></tr>
   </table>
</div>
