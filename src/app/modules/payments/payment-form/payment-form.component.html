<h2 mat-dialog-title>{{ data ? 'Modifier Paiement' : 'Ajouter Paiement' }}</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="datta-form-grid">
    <div class="row">
      <div class="form-group col-md-6">
        <label for="patientId">Patient ID</label>
        <input id="patientId" type="number" class="form-control" formControlName="patientId">
      </div>
      <div class="form-group col-md-6">
        <label for="seanceId">Séance ID</label>
        <input id="seanceId" type="number" class="form-control" formControlName="seanceId">
      </div>
    </div>
    <div class="row">
      <div class="form-group col-md-6">
        <label for="amount">Montant</label>
        <div class="input-group">
          <input id="amount" type="number" class="form-control" formControlName="amount" step="0.01" min="0">
          <span class="input-group-text">Dh</span>
        </div>
      </div>
      <div class="form-group col-md-6">
        <label for="date">Date</label>
        <input id="date" type="date" class="form-control" formControlName="date">
      </div>
    </div>
    <div class="row">
      <div class="form-group col-md-6">
        <label for="method">Méthode</label>
        <select id="method" class="form-control" formControlName="method">
          <option value="">Sélectionner...</option>
          <option *ngFor="let m of methods" [value]="m">{{ m }}</option>
        </select>
      </div>
      <div class="form-group col-md-6">
        <label for="status">Statut</label>
        <select id="status" class="form-control" formControlName="status">
          <option value="">Sélectionner...</option>
          <option *ngFor="let s of statuses" [value]="s">{{ s }}</option>
        </select>
      </div>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="datta-dialog-actions">
  <button type="button" class="btn btn-secondary" (click)="cancel()">Annuler</button>
  <button type="button" class="btn btn-primary" (click)="save()">Enregistrer</button>
</mat-dialog-actions>
