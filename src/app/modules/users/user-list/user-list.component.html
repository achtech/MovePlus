<div  class="user-list">
   <button  mat-raised-button  color="primary"  (click)="addUser()">Ajouter Utilisateur</button>

   <table  mat-table  [dataSource]="users"  class="mat-elevation-z8">
      <ng-container  matColumnDef="username">
          <th  mat-header-cell  *matHeaderCellDef>Nom  d'utilisateur</th>
          <td  mat-cell *matCellDef="let  u">{{  u.username  }}</td>
      </ng-container>

       <ng-container  matColumnDef="email">
          <th  mat-header-cell *matHeaderCellDef>Email</th>
           <td mat-cell  *matCellDef="let  u">{{  u.email }}</td>
       </ng-container>

       <ng-container matColumnDef="role">
           <th mat-header-cell  *matHeaderCellDef>Rôle</th>
          <td  mat-cell  *matCellDef="let  u">{{ u.role  }}</td>
       </ng-container>

      <ng-container  matColumnDef="enabled">
          <th  mat-header-cell  *matHeaderCellDef>Actif</th>
          <td  mat-cell  *matCellDef="let u">{{  u.enabled  ?  'Oui' :  'Non'  }}</td>
       </ng-container>

       <ng-container  matColumnDef="actions">
          <th  mat-header-cell  *matHeaderCellDef>Actions</th>
          <td  mat-cell *matCellDef="let  u">
              <button  mat-icon-button color="accent"  (click)="editUser(u)">
                 <mat-icon>edit</mat-icon>
              </button>
              <button  mat-icon-button color="warn"  (click)="deleteUser(u.id!)">
                 <mat-icon>delete</mat-icon>
              </button>
          </td>
       </ng-container>

       <tr mat-header-row  *matHeaderRowDef="displayedColumns"></tr>
       <tr  mat-row *matRowDef="let  row;  columns:  displayedColumns;"></tr>
   </table>
</div>
