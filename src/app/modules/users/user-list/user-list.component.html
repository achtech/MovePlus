<div class="table-page">
  <app-card cardTitle="Utilisateurs" [options]="false">
    <div class="table-toolbar">
      <p-button label="Ajouter Utilisateur" icon="pi pi-plus" (click)="addUser()" />
      <p-iconfield iconPosition="left" class="search-input">
        <p-inputicon>
          <i class="pi pi-search"></i>
        </p-inputicon>
        <input pInputText type="text" (input)="dt1.filterGlobal($event.target.value, 'contains')" placeholder="Rechercher..." />
      </p-iconfield>
    </div>

    <p-table #dt1 [value]="users" dataKey="id" [rows]="10" [rowsPerPageOptions]="[10, 25, 50]" [loading]="loading" [paginator]="true" [globalFilterFields]="['username', 'email', 'role', 'enabled']" showGridlines>
      <ng-template #caption>
        <div class="flex">
          <p-button label="Clear" [outlined]="true" icon="pi pi-filter-slash" (click)="clear(dt1)" />
        </div>
      </ng-template>
      <ng-template #header>
        <tr>
          <th style="min-width:15rem">
            <div class="flex items-center justify-between">
              Nom d'utilisateur
              <p-columnFilter type="text" field="username" display="menu" />
            </div>
          </th>
          <th style="min-width:15rem">
            <div class="flex items-center justify-between">
              Email
              <p-columnFilter type="text" field="email" display="menu" />
            </div>
          </th>
          <th style="min-width:10rem">
            <div class="flex items-center justify-between">
              Rôle
              <p-columnFilter type="text" field="role" display="menu" />
            </div>
          </th>
          <th style="min-width:10rem">
            <div class="flex items-center justify-between">
              Actif
              <p-columnFilter type="boolean" field="enabled" display="menu" />
            </div>
          </th>
          <th style="min-width:10rem">Actions</th>
        </tr>
      </ng-template>
      <ng-template #body let-u>
        <tr>
          <td>{{ u.username }}</td>
          <td>{{ u.email }}</td>
          <td>{{ u.role }}</td>
          <td>{{ u.enabled ? 'Oui' : 'Non' }}</td>
          <td>
            <p-button icon="pi pi-pencil" [outlined]="true" (click)="editUser(u)" />
            <p-button icon="pi pi-key" [outlined]="true" (click)="resetPassword(u)" pTooltip="Réinitialiser le mot de passe" />
            <p-button icon="pi pi-trash" [outlined]="true" severity="danger" (click)="deleteUser(u.id!)" />
          </td>
        </tr>
      </ng-template>
      <ng-template #emptymessage>
        <tr>
          <td colspan="5">Aucun utilisateur trouvé.</td>
        </tr>
      </ng-template>
    </p-table>
  </app-card>
</div>

<p-confirmDialog></p-confirmDialog>
