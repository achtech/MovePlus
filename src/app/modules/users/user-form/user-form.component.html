<h2 mat-dialog-title>{{ data ? 'Modifier Utilisateur' : 'Ajouter Utilisateur' }}</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="datta-form-grid">
    <div class="row">
      <div class="form-group col-md-6">
        <label for="username">Nom d'utilisateur</label>
        <input id="username" type="text" class="form-control" formControlName="username">
      </div>
      <div class="form-group col-md-6">
        <label for="email">Email</label>
        <input id="email" type="email" class="form-control" formControlName="email">
      </div>
    </div>
    <div class="row" *ngIf="!data">
      <div class="form-group col-md-6">
        <label for="password">Mot de passe</label>
        <input id="password" type="password" class="form-control" formControlName="password">
      </div>
      <div class="form-group col-md-6">
        <label for="confirmPassword">Confirmer le mot de passe</label>
        <input id="confirmPassword" type="password" class="form-control" formControlName="confirmPassword">
        <span class="invalid-feedback" *ngIf="form.get('confirmPassword')?.hasError('passwordMismatch')">
          Les mots de passe ne correspondent pas
        </span>
      </div>
    </div>
    <div class="row">
      <div class="form-group col-md-6">
        <label for="role">Rôle</label>
        <select id="role" class="form-control" formControlName="role">
          <option value="">Sélectionner...</option>
          <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
        </select>
      </div>
      <div class="form-group col-md-6">
        <label for="enabled">Actif</label>
        <select id="enabled" class="form-control" formControlName="enabled">
          <option [ngValue]="true">Oui</option>
          <option [ngValue]="false">Non</option>
        </select>
      </div>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="datta-dialog-actions">
  <button type="button" class="btn btn-secondary" (click)="cancel()">Annuler</button>
  <button type="button" class="btn btn-primary" (click)="save()">Enregistrer</button>
</mat-dialog-actions>
