<h2  mat-dialog-title>{{ data  ?  'Modifier  Utilisateur' :  'Ajouter  Utilisateur'  }}</h2>
<mat-dialog-content>
    <form [formGroup]="form">
       <mat-form-field  appearance="fill">
          <mat-label>Nom  d'utilisateur</mat-label>
          <input  matInput  formControlName="username">
      </mat-form-field>

       <mat-form-field  appearance="fill">
          <mat-label>Email</mat-label>
          <input  matInput  formControlName="email">
      </mat-form-field>

       <mat-form-field  appearance="fill" *ngIf="!data">
           <mat-label>Mot de  passe</mat-label>
          <input  matInput  type="password"  formControlName="password">
      </mat-form-field>

       <mat-form-field  appearance="fill">
          <mat-label>Rôle</mat-label>
          <mat-select  formControlName="role">
              <mat-option *ngFor="let  r  of  roles" [value]="r">{{  r  }}</mat-option>
          </mat-select>
       </mat-form-field>

      <mat-form-field  appearance="fill">
          <mat-label>Actif</mat-label>
           <mat-select formControlName="enabled">
              <mat-option  [value]="true">Oui</mat-option>
              <mat-option [value]="false">Non</mat-option>
           </mat-select>
      </mat-form-field>
    </form>
</mat-dialog-content>

<mat-dialog-actions  align="end">
   <button  mat-button (click)="cancel()">Annuler</button>
    <button mat-raised-button  color="primary"  (click)="save()">Enregistrer</button>
</mat-dialog-actions>
