<div class="reset-password-card">
  <h2>Reset Password</h2>
  <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()">
    <mat-form-field appearance="fill">
      <mat-label>New Password</mat-label>
      <input matInput type="password" formControlName="password" required>
      <mat-error *ngIf="(passwordForm.get('password')?.invalid ?? false) && (passwordForm.get('password')?.touched ?? false)">
        Password is required (min 6 characters).
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Confirm New Password</mat-label>
      <input matInput type="password" formControlName="confirmPassword" required>
      <mat-error *ngIf="(passwordForm.get('confirmPassword')?.invalid ?? false) && (passwordForm.get('confirmPassword')?.touched ?? false)">
        Confirmation is required.
      </mat-error>
    </mat-form-field>

    <div class="button-group">
      <button mat-raised-button color="primary" type="submit" [disabled]="passwordForm.invalid">Submit</button>
      <button mat-stroked-button color="warn" type="button" (click)="onCancel()">Cancel</button>
    </div>
  </form>
</div>
