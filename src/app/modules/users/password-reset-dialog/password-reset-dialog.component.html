<h2 mat-dialog-title>Réinitialiser le mot de passe</h2>

<mat-dialog-content>
  <form [formGroup]="passwordForm" class="datta-form-grid" (ngSubmit)="onSubmit()">
    <div class="row">
      <div class="form-group col-md-6">
        <label for="password">Nouveau mot de passe</label>
        <input id="password" type="password" class="form-control" formControlName="password" required>
        <span class="invalid-feedback" *ngIf="(passwordForm.get('password')?.invalid ?? false) && (passwordForm.get('password')?.touched ?? false)">
          Mot de passe requis (min. 6 caractères).
        </span>
      </div>
      <div class="form-group col-md-6">
        <label for="confirmPassword">Confirmer le mot de passe</label>
        <input id="confirmPassword" type="password" class="form-control" formControlName="confirmPassword" required>
        <span class="invalid-feedback" *ngIf="(passwordForm.get('confirmPassword')?.invalid ?? false) && (passwordForm.get('confirmPassword')?.touched ?? false)">
          Confirmation requise.
        </span>
      </div>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="datta-dialog-actions">
  <button type="button" class="btn btn-secondary" (click)="onCancel()">Annuler</button>
  <button type="button" class="btn btn-primary" (click)="onSubmit()" [disabled]="passwordForm.invalid">Enregistrer</button>
</mat-dialog-actions>
