<mat-card class="login-card">
    <h2 class="login-title">Connexion</h2>
    <form [formGroup]="form" (ngSubmit)="login()">
        <mat-form-field appearance="fill">
            <mat-label>Nom d'utilisateur</mat-label>
            <input matInput formControlName="username" autocomplete="username" required>
            <mat-error *ngIf="form.get('username')?.invalid && form.get('username')?.touched">Nom d'utilisateur requis</mat-error>
        </mat-form-field>

        <mat-form-field appearance="fill">
            <mat-label>Mot de passe</mat-label>
            <input matInput type="password" formControlName="password" autocomplete="current-password" required>
            <mat-error *ngIf="form.get('password')?.invalid && form.get('password')?.touched">Mot de passe requis</mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">Se connecter</button>
        <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>
    </form>
</mat-card>
